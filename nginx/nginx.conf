# Nginx alternative reverse proxy config for Qonnect WiFi Portal
# Run with: nginx -c /path/to/nginx.conf
# TLS cert via Certbot: certbot --nginx -d portal.yourdomain.com

# Redirect HTTP → HTTPS (captive portal intercept is on port 80 at MikroTik,
# so this redirect catches any direct browser navs to http:// on this server)
server {
    listen 80;
    server_name portal.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/portal.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.yourdomain.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # HSTS (only enable once TLS is confirmed working)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Pass real IP to Node.js
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              $host;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";  # WebSocket support
        proxy_read_timeout 60s;
    }

    # Serve large log files efficiently
    access_log /var/log/nginx/portal-access.log;
    error_log  /var/log/nginx/portal-error.log;
}
